<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dante</title>
    <style>
    body{
        display:flex;
        flex-direction:column;
        justify-content:flex-start;
        align-items:center;
        height:100vh;
        margin:0;
        background-color: #008f39;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        padding: 10px;
    }

    h1{
        font-size: 1.5rem;
        margin-bottom: 15px;
    }

    img{
        width: 50%
        max-width: 400px;
        height: auto;
        margin: 20px 0;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }


    audio{
        width: 80%;
        margin-top: 10px;
        outline: none;



    }



    @media (max-width: 500px){
        h1{font-size:1.2rem; }
        img, audio{width: 100%;}
    }
    </style>
</head>
<body> 
    <h1>Dante che si lamenta:</h1>
    <img src="cagnolino.jpg" alt="Foto di Dante">
    <audio controls autoplay>
        <source src="WhatsApp Image 2026-03-28 at 17.05.57.jpg" type="audio/mpeg">
        Il tuo browser non supporta la riproduzione audio.
    </audio>
</body>
</html>
